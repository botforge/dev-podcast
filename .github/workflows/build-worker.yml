name: build-worker

# Builds the MisoTTS RunPod worker image in CI (logs are fully visible via `gh run view`)
# and pushes it to GitHub Container Registry. RunPod then pulls this prebuilt image.

on:
  push:
    paths:
      - "runpod/**"
      - ".github/workflows/build-worker.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          docker system prune -af || true
          df -h /

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: runpod
          file: runpod/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dev-podcast:latest
            ghcr.io/${{ github.repository_owner }}/dev-podcast:${{ github.sha }}
